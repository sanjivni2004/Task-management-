<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Management Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Task Form Assignment Module -->
        <div class="card animated-fade">
            <h3>Assign New Task</h3>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                
                <select id="empDropdown" required>
                    <option value="">Choose Employee...</option>
                </select>
                
                <select id="taskStatus" required>
                    <option value="Pending">Pending (False)</option>
                    <option value="Completed">Completed (True)</option>
                </select>
                
                <button type="submit" class="btn">Assign & Track</button>
            </form>
        </div>
    </div>
    <script src="/static/js/main.js"></script>
</body>
</html>
